{% extends 'admin/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0"><i class="fas fa-trash"></i> Delete User</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="alert alert-warning">
                            <i class="fas fa-exclamation-triangle"></i>
                            Are you sure you want to delete user <strong>{{ user_obj.get_full_name|default:user_obj.username }}</strong> ({{ user_obj.email }})?
                            <br>This action cannot be undone.
                        </div>
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> Confirm Delete</button>
                        <a href="{% url 'admin_control:view_user' user_obj.pk %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
