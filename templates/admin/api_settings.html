{% extends 'admin/base.html' %}

{% block title %}API Settings - Admin Panel{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <div class="admin-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0 card-title"><i class="fas fa-cogs mr-2"></i>API Settings</h4>
                </div>
                <div class="card-body">
                    <div class="admin-form">
                        <div class="form-group">
                            <label for="{{ form.google_ai_api_key.id_for_label }}">{{ form.google_ai_api_key.label }}</label>
                            <input type="text" class="form-control" id="{{ form.google_ai_api_key.id_for_label }}" value="{{ form.google_ai_api_key.value }}" readonly>
                            <small class="form-text text-muted">This key is required for the Plant AI chat feature to work. Your key is stored securely and is never exposed to the public.</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
