{% extends 'base/base.html' %}
{% load static %}
{% load custom_filters %}

{% block title %}Payment - Plant & Gardening Store{% endblock %}

{% block extra_css %}
<style>
.payment-container {
    background: white;
    border-radius: 20px;
    padding: 3rem;
    margin: 2rem auto;
    max-width: 600px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border: 2px solid var(--celadon-2);
    text-align: center;
}

.payment-icon {
    font-size: 4rem;
    color: var(--sea-green);
    margin-bottom: 2rem;
}

.payment-title {
    color: var(--dartmouth-green);
    font-weight: 700;
    margin-bottom: 1rem;
}

.payment-amount {
    font-size: 2rem;
    font-weight: 700;
    color: var(--sea-green);
    margin-bottom: 2rem;
}

.razorpay-btn {
    background: linear-gradient(135deg, #3395ff 0%, #2d7ae0 100%);
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 25px;
    font-weight: 600;
    font-size: 1.1rem;
    transition: all 0.3s ease;
}

.razorpay-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(51, 149, 255, 0.3);
}
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="payment-container">
        <div class="payment-icon">
            <i class="fas fa-credit-card"></i>
        </div>
        
        <h2 class="payment-title">Complete Payment</h2>
        <div class="payment-amount">₹{{ amount|floatformat:0|div:100 }}</div>
        
        <button id="rzp-button" class="razorpay-btn">
            <i class="fas fa-lock"></i> Pay with Razorpay
        </button>
        
        <div class="mt-3">
            <a href="{% url 'order_payment:checkout' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Back to Checkout
            </a>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
document.getElementById('rzp-button').onclick = function(e) {
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ amount }}",
        "currency": "{{ currency }}",
        "name": "Plant & Garden Store",
        "description": "Order Payment",
        "order_id": "{{ razorpay_order_id }}",
        "handler": function (response) {
            // Create a form to submit payment details
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '{% url "order_payment:payment_success" %}';
            
            // Add CSRF token
            var csrfInput = document.createElement('input');
            csrfInput.type = 'hidden';
            csrfInput.name = 'csrfmiddlewaretoken';
            csrfInput.value = '{{ csrf_token }}';
            form.appendChild(csrfInput);
            
            // Add payment details
            var paymentIdInput = document.createElement('input');
            paymentIdInput.type = 'hidden';
            paymentIdInput.name = 'razorpay_payment_id';
            paymentIdInput.value = response.razorpay_payment_id;
            form.appendChild(paymentIdInput);
            
            var orderIdInput = document.createElement('input');
            orderIdInput.type = 'hidden';
            orderIdInput.name = 'razorpay_order_id';
            orderIdInput.value = response.razorpay_order_id;
            form.appendChild(orderIdInput);
            
            var signatureInput = document.createElement('input');
            signatureInput.type = 'hidden';
            signatureInput.name = 'razorpay_signature';
            signatureInput.value = response.razorpay_signature;
            form.appendChild(signatureInput);
            
            document.body.appendChild(form);
            form.submit();
        },
        "prefill": {
            "name": "{{ user.get_full_name|default:user.username }}",
            "email": "{{ user.email }}",
            "contact": "{{ user.phone_number|default:'' }}"
        },
        "theme": {
            "color": "#40916c"
        },
        "modal": {
            "ondismiss": function() {
                console.log('Payment cancelled');
            }
        }
    };
    
    var rzp = new Razorpay(options);
    rzp.open();
    e.preventDefault();
}
</script>
{% endblock %}
